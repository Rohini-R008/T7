<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundry Mart Login</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
        <div class="container">

        <!-- Left Section -->
        <div class="left">
            <img src="https://images.unsplash.com/photo-1626806787461-102c1bfaaea1?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8d2FzaGluZyUyMG1hY2hpbmV8ZW58MHx8MHx8fDA%3D">
        </div>

        <!-- Right Section -->
        <div class="right">

            <div class="login-box">

                <h1>Hello Again!</h1>
                <p>Welcome back! we missed you!</p>

                <label>Email</label>
                <input type="email" placeholder="Emailid@site.com">

                <label>Password</label>
                <input type="password" placeholder="Password">

                <div class="forgot">Forgot Password</div>

                <button>Login</button>

                <p class="register">Not a member? <a href="#">Register Now</a></p>

            </div>

        </div>

    </div>
</body>
</html>
